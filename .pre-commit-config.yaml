repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        name: sort imports
        args: [ --fix, --select, I]
      - id: ruff-check
        name: lint
        args: [ --fix]
      - id: ruff-format
        name: format