stages:
  - build
  - deploy

variables:
  SPHINX_VERSION: "8.0.2"

make_html:
  stage: build
  image: ghcr.io/sphinx-doc/sphinx:$SPHINX_VERSION
  script:
    - apt-get update
    - apt-get -y --no-install-recommends install git gcc libc-dev
    - pip install --upgrade pip
    - pip install -r docs/docs-requirements.txt
    - pip install .
    - cd docs
    - make clean html
  artifacts:
    paths:
      - docs/_build/html

pages:
  stage: deploy
  script:
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
