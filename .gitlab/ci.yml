stages:
  - test
  - deploy

pytest:
  stage: test
  image: python:3.13
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /Merge branch .+ into .+\n+See merge request/'
      when: never  # Skip post-merge pipelines
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - pip install -q --root-user-action=ignore uv
    - uv sync --all-extras
    - source .venv/bin/activate
    - mypy src
    - pytest --cov=typed_lisa_toolkit --cov-branch --cov-report=term-missing
        --cov-report=xml:coverage.xml --junitxml=report.xml 
        --cov-fail-under=90 tests
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - coverage.xml
      - report.xml
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

    expire_in: 1 week

pages:
  stage: deploy
  image: python:3.13
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+.*/
  script:
    - pip install -q --root-user-action=ignore uv
    - uv sync --group doc
    - source .venv/bin/activate
    - make -C docs clean html
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
    expire_in: 1 week
